name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      # Fetch full history and Git LFS objects (CSV fixtures are LFS-tracked).
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Verify Git LFS objects
        run: |
          git lfs install
          git lfs pull
          git lfs ls-files
          if [ -z "$(git lfs ls-files)" ]; then
            echo "No Git LFS tracked files in this repository."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src app tests

      - name: Mypy
        run: mypy

      - name: pip-audit
        run: pip-audit -r requirements.txt --desc on

      # Fail fast if any CSV under known data dirs is still an LFS pointer.
      - name: Validate CSV files are not LFS pointers
        run: |
          set -euo pipefail
          LFS_PREFIX="version https://git-lfs.github.com/spec/v1"
          AFFECTED=()
          for dir in data tests fixtures sample_data; do
            [ -d "$dir" ] || continue
            while IFS= read -r -d '' file; do
              if head -c 80 "$file" | grep -q "^${LFS_PREFIX}"; then
                AFFECTED+=("$file")
              fi
            done < <(find "$dir" -type f -name '*.csv' -print0)
          done
          if [ "${#AFFECTED[@]}" -gt 0 ]; then
            echo "::error::Git LFS pointer file(s) detected — CSV content was not fetched:"
            printf '  - %s\n' "${AFFECTED[@]}"
            echo ""
            echo "::warning::If LFS objects were never pushed to the remote, the maintainer must run:"
            echo "  git lfs push origin --all"
            exit 1
          fi
          echo "All CSV files under data/, tests/, fixtures/, sample_data/ contain real content."

      - name: Pytest
        run: pytest -q

  publish:
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Fetch full history and Git LFS objects for consistency across CI jobs.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Verify Git LFS objects
        run: |
          git lfs install
          git lfs pull
          git lfs ls-files
          if [ -z "$(git lfs ls-files)" ]; then
            echo "No Git LFS tracked files in this repository."
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "image=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image }}:latest
            ghcr.io/${{ steps.vars.outputs.image }}:${{ github.sha }}
