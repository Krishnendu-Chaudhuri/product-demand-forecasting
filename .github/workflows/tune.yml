name: Tune Model

on:
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run hyperparameter tuning
        run: python main.py train --tune

      - name: Upload tuned model metadata
        uses: actions/upload-artifact@v4
        with:
          name: tuned-model-metadata
          path: models/*/metadata.json
