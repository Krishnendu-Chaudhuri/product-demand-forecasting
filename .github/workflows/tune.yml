name: Tune Model

on:
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    steps:
      # Fetch full history and Git LFS objects (CSV datasets may be LFS-tracked).
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Verify Git LFS objects
        run: |
          git lfs install
          git lfs pull
          git lfs ls-files
          if [ -z "$(git lfs ls-files)" ]; then
            echo "No Git LFS tracked files in this repository."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run hyperparameter tuning
        run: python main.py train --tune

      - name: Upload tuned model metadata
        uses: actions/upload-artifact@v4
        with:
          name: tuned-model-metadata
          path: models/*/metadata.json
